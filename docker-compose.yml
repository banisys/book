services:
  embedder:
    build: ./embedder
    ports:
      - "8001:8001"

  api:
    image: alighasempoor/book-api:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/uploads
      - ./api/app:/app/app   # ← این خط اضافه شد
    environment:
      - QDRANT_HOST=qdrant
      - EMBEDDER_HOST=embedder
      - OLLAMA_HOST=host.docker.internal
    depends_on:
      - qdrant
      - embedder
    extra_hosts:
      - "host.docker.internal:host-gateway"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage      